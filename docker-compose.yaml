services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  preprocessing: 
    build: .
    depends_on:
      - db   # ✅ nur Service-Name, keine Condition
    volumes:
      - ./app:/app
    working_dir: /app
    command: python preprocessing/data_preprocessing.py
    env_file: .env
    restart: "no"

volumes:
  pgdata:
